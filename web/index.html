<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="OpenAI 接口聚合管理，支持多种渠道包括 Azure，可用于二次分发管理 key。"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <meta name="generator" content="new-api" />
    <title></title>
    <script>
      (function () {
        try {
          var systemName = localStorage.getItem('system_name');
          if (systemName) document.title = systemName;

          var logo = localStorage.getItem('logo');
          if (!logo) return;

          var linkElement = document.querySelector("link[rel~='icon']");
          if (!linkElement) {
            linkElement = document.createElement('link');
            linkElement.rel = 'icon';
            document.head.appendChild(linkElement);
          }
          linkElement.href = logo;
        } catch (error) {
          // Keep the static fallback when localStorage is unavailable.
        }
      })();
    </script>
    <!--umami-->
    <!--Google Analytics-->
</head>

<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>
<script type="module" src="/src/index.jsx"></script>
</body>
</html>
