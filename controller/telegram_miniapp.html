<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>账号绑定</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
    }
    h2 { margin: 8px 0 12px; font-size: 18px; }
    p.hint { margin: 0 0 4px; font-size: 13px; opacity: .8; }
    label { display: block; font-size: 14px; margin: 16px 0 6px; }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid var(--tg-theme-hint-color, #cccccc);
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000000);
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: var(--tg-theme-button-text-color, #ffffff);
      background: var(--tg-theme-button-color, #3390ec);
    }
    button:disabled { opacity: .6; cursor: default; }
    #msg { margin-top: 18px; font-size: 14px; white-space: pre-wrap; text-align: center; }
    .err { color: var(--tg-theme-destructive-text-color, #e53935); }
    .ok { color: #2e7d32; }
  </style>
</head>
<body>
  <h2>绑定网站账号</h2>
  <p class="hint">请输入你的网站用户名以完成绑定。</p>
  <form id="f">
    <label for="u">网站用户名</label>
    <input id="u" name="username" autocomplete="off" autocapitalize="off" required />
    <button id="b" type="submit">确定</button>
  </form>
  <div id="msg"></div>
  <script>
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) { tg.ready(); tg.expand(); }
      var form = document.getElementById('f');
      var btn = document.getElementById('b');
      var msg = document.getElementById('msg');
      function show(text, ok) {
        msg.textContent = text || '';
        msg.className = ok ? 'ok' : 'err';
      }
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var initData = tg ? tg.initData : '';
        if (!initData) { show('无法获取 Telegram 身份信息，请从 Telegram 内打开本页面。', false); return; }
        var username = document.getElementById('u').value.trim();
        if (!username) { show('请输入用户名', false); return; }
        btn.disabled = true;
        show('正在验证…', false);
        try {
          var res = await fetch('/api/telegram/miniapp/bind', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, initData: initData })
          });
          var data = await res.json();
          show(data.message || (data.success ? '验证成功' : '验证失败'), !!data.success);
        } catch (err) {
          show('网络错误：' + (err && err.message ? err.message : err), false);
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
